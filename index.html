<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sleepy theatre</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'bianzhidai';
            src: url('bianzhidai_noBG-Ring.ttf') format('truetype'),
                 url('bianzhidai_noBG-Ring.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #141414;       
            --text-main: #ffffff;      
            --text-dim: #4d4d4d;       
            --accent-cyan: #68d0e8;    
            
            --font-display: 'bianzhidai', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --font-ascii: 'Monaco', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000; 
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .phone-container {
            width: 393px;
            height: 852px;
            background-color: var(--bg-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .page {
            display: none;
            width: 100%;
            height: 100%;
            padding: 65px 35px 55px 35px;
            flex-direction: column;
            position: relative;
        }

        .page.active {
            display: flex;
            animation: pageFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .font-display { font-family: var(--font-display); text-transform: lowercase; }
        .font-body { font-family: var(--font-body); }
        .font-ascii { font-family: var(--font-ascii); white-space: pre; line-height: 1.3; font-size: 13px; }

        /* ================= [STEP 1] 스플래시 화면 ================= */
        .splash-title {
            font-size: 44px;
            line-height: 1.3;
            letter-spacing: 1px;
            margin-top: 15px;
        }
        .splash-title span { color: var(--accent-cyan); font-size: 28px; vertical-align: super; }

        .splash-watermark-list {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            color: var(--text-dim);
            font-size: 26px;
            user-select: none;
        }

        /* 🛠️ Y축 높이는 유지하되 X축 기준 완전히 정중앙으로 배치 */
        .splash-sheep-pos {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 220px;
            color: var(--accent-cyan);
            text-align: left; /* 아스키 아트 고유 형태 유지를 위해 좌측 정렬 상태로 블록 박스만 중앙 배치 */
        }

        .input-container {
            margin-top: auto;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--text-dim);
            padding-bottom: 8px;
        }
        .input-container:focus-within { border-color: var(--text-main); }

        .input-box {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 16px;
            flex: 1;
            outline: none;
        }
        .input-box::placeholder { color: var(--text-dim); }

        .arrow-submit {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s, color 0.2s;
        }
        .arrow-submit:hover { color: var(--accent-cyan); transform: translateX(4px); }

        /* ================= [STEP 2] 목차 화면 ================= */
        .menu-header { display: flex; align-items: flex-start; gap: 12px; }
        .menu-header .sheep-avatar { color: var(--accent-cyan); }
        .menu-header .sub-desc { color: var(--text-dim); font-size: 12px; margin-top: 3px; }

        .menu-nav-list {
            list-style: none;
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        .menu-nav-item {
            font-size: 38px;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 1px;
            display: inline-block;
            width: fit-content;
        }
        .menu-nav-item:hover { color: var(--text-main); transform: translateX(15px); }
        .menu-nav-item:hover::after { content: ' °'; color: var(--accent-cyan); font-size: 24px; vertical-align: super; }

        .radio-station-tower { text-align: center; color: var(--text-dim); margin: 35px auto 0 auto; opacity: 0.4; }

        .herd-plain-section { margin-top: auto; border-top: 1px dashed rgba(255, 255, 255, 0.08); padding-top: 18px; }
        .herd-flex-box { display: flex; flex-wrap: wrap; gap: 16px; color: var(--accent-cyan); min-height: 45px; }
        .plain-line { color: var(--text-dim); margin-top: 8px; letter-spacing: -0.5px; font-size: 12px; }

        /* ================= [STEP 3] 라디오 극장 화면 ================= */
        .theatre-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .theatre-header .left-sheep { color: var(--accent-cyan); }
        
        .theatre-title { font-size: 28px; color: var(--accent-cyan); text-align: right; cursor: pointer; }
        .theatre-title span { font-size: 16px; color: var(--text-dim); font-weight: 300; }

        .user-status-row { display: flex; align-items: center; gap: 12px; margin-top: 35px; font-size: 13px; }
        .user-status-row .username-label { color: var(--text-dim); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .status-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: var(--font-body);
            font-size: 13px;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        .status-toggle-btn.active { color: var(--text-main); }
        .status-toggle-btn.active::before {
            content: '°'; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); color: var(--accent-cyan); font-size: 16px;
        }

        /* 시어터 스크린 구역 */
        .cinema-screen { width: 100%; height: 205px; background-color: #1a1a1a; margin-top: 25px; border-radius: 2px; overflow: hidden; position: relative; }
        .cinema-screen video { width: 100%; height: 100%; object-fit: cover; background: #000; position: absolute; top: 0; left: 0; }
        .cinema-meta-title { margin-top: 12px; font-size: 13px; color: var(--text-dim); }

        /* 아스키 채팅 피드 구역 */
        .radio-chat-stream {
            margin-top: 25px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px; 
        }
        .radio-chat-stream::-webkit-scrollbar { width: 0px; }

        .stream-row { display: flex; align-items: flex-start; gap: 14px; overflow: visible; }
        .stream-sheep { color: var(--accent-cyan); font-size: 13px; white-space: pre; line-height: 1.3; flex-shrink: 0; }
        .stream-msg { font-size: 13px; color: var(--text-dim); line-height: 1.3; margin-top: 17px; }
        .stream-msg .user-bold { color: var(--text-dim); }
        .stream-msg .user-bold.me { color: var(--text-main); font-weight: 500; }
    </style>
</head>
<body>

    <div class="phone-container">

        <div id="panel-splash" class="page active">
            <div class="splash-title font-display">sleepy<br>theatre<span>°</span></div>
            <div class="splash-watermark-list font-display">
                <div>space</div><div>nature</div><div>history</div><div>ASMR</div>
            </div>
            <div class="splash-sheep-pos font-ascii">,---@&gt;
   W-W'</div>
            <div class="input-container">
                <input type="text" id="user-id-input" class="input-box" placeholder="enter your id" autocomplete="off">
                <button type="button" class="arrow-submit" id="btn-submit-arrow">→</button>
            </div>
        </div>

        <div id="panel-menu" class="page">
            <div class="menu-header">
                <div id="dynamic-avatar-sheep" class="font-ascii sheep-avatar"></div>
                <div class="sub-desc font-body">&lt; I am your sheep</div>
            </div>
            <ul class="menu-nav-list font-display">
                <li class="menu-nav-item" onclick="tuneInTheatre('space')">space</li>
                <li class="menu-nav-item" onclick="tuneInTheatre('nature')">nature</li>
                <li class="menu-nav-item" onclick="tuneInTheatre('history')">history</li>
                <li class="menu-nav-item" onclick="tuneInTheatre('ASMR')">ASMR</li>
            </ul>
            <div class="radio-station-tower font-ascii">
     o
     |
   \ | /
   (\│/)
 .-----------.
|  _ _   _ _  |
| | | | | | | |
|  - -   - -  |
|  _ _        |
| | | |  """  |
|  - -        |
            </div>
            <div class="herd-plain-section">
                <div id="dynamic-plain-herd" class="herd-flex-box font-ascii"></div>
                <div class="plain-line font-ascii">---^^^---.,,^^^---^^^---.,,^^^</div>
            </div>
        </div>

        <div id="panel-player" class="page">
            <div class="theatre-header">
                <div id="theatre-avatar-sheep" class="font-ascii left-sheep"></div>
                <div class="theatre-title font-display" onclick="returnToMenu()">
                    <span id="label-genre-current">space</span> <span>fm</span>
                </div>
            </div>
            <div class="user-status-row font-body">
                <span id="label-my-identity" class="username-label">Guest is...</span>
                <button type="button" class="status-toggle-btn active" id="status-awake-btn" onclick="toggleMyStatus('still awake')">still awake</button>
                <button type="button" class="status-toggle-btn" id="status-sleepy-btn" onclick="toggleMyStatus('sleepy')">sleepy</button>
            </div>
            
            <div class="cinema-screen">
                <video id="vid-space" src="space.mp4" loop muted playsinline style="display: none;"></video>
                <video id="vid-nature" src="nature.mp4" loop muted playsinline style="display: none;"></video>
                <video id="vid-history" src="history.mp4" loop muted playsinline style="display: none;"></video>
                <video id="vid-ASMR" src="ASMR.mp4" loop muted playsinline style="display: none;"></video>
            </div>

            <div class="cinema-meta-title font-body" id="cinema-meta-title">Streaming Live Broadcast</div>
            <div class="radio-chat-stream" id="radio-chat-stream"></div>
        </div>

    </div>

    <script>
        const USE_SIMULATION = false; 

        let savedUserId = "Guest";
        let savedUserStatus = "still awake";
        let activeStreamInterval = null;
        const genresList = ['space', 'nature', 'history', 'ASMR'];

        const radioActiveNetwork = [
            { id: "Junseo", status: "still awake" },
            { id: "Kyueung", status: "sleepy" },
            { id: "Hawon", status: "still awake" },
            { id: "Jinjoo", status: "still awake" },
            { id: "Junghwa", status: "still awake" }
        ];

        function generateIdSheep(idString) {
            const initialLetter = idString ? idString.charAt(0).toUpperCase() : 'W';
            return `,---@>\n ${initialLetter}-${initialLetter}'`;
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn-submit-arrow').addEventListener('click', executeLogin);
            document.getElementById('user-id-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') executeLogin();
            });
        });

        function executeLogin() {
            const rawInput = document.getElementById('user-id-input').value.trim();
            if (rawInput) savedUserId = rawInput;

            const personalizedSheep = generateIdSheep(savedUserId);
            document.getElementById('dynamic-avatar-sheep').innerText = personalizedSheep;
            document.getElementById('theatre-avatar-sheep').innerText = personalizedSheep;
            document.getElementById('label-my-identity').innerText = savedUserId + " is...";

            // 🛠️ 초기 구동 시에는 전부 음소거(muted = true) 시킨 채로 백그라운드 재생만 스타트합니다.
            genresList.forEach(genre => {
                const targetVid = document.getElementById(`vid-${genre}`);
                if (targetVid) {
                    targetVid.muted = true;
                    targetVid.play().catch(err => console.log(`${genre} 백그라운드 싱크 로드`, err));
                }
            });

            generatePlainHerdGrid();
            navigateToSection('panel-menu');
        }

        function generatePlainHerdGrid() {
            const targetPlain = document.getElementById('dynamic-plain-herd');
            if (!targetPlain) return;
            targetPlain.innerHTML = "";
            
            const combinedHerd = USE_SIMULATION 
                ? [{ id: savedUserId }, ...radioActiveNetwork].slice(0, 6)
                : [{ id: savedUserId }];
                
            combinedHerd.forEach(member => {
                const wrapperNode = document.createElement('div');
                wrapperNode.innerText = generateIdSheep(member.id);
                targetPlain.appendChild(wrapperNode);
            });
        }

        // 🛠️ 방에 진입할 때 오디오 음소거 제어 스위칭 로직 고도화
        function tuneInTheatre(genreKey) {
            document.getElementById('label-genre-current').innerText = genreKey;
            document.getElementById('cinema-meta-title').innerText = `${genreKey.toUpperCase()} Ambient Theater`;
            
            // 1. 우선 다른 모든 비디오를 숨기고 사운드를 차단(muted = true)합니다.
            genresList.forEach(genre => {
                const vid = document.getElementById(`vid-${genre}`);
                if (vid) {
                    vid.style.display = 'none';
                    vid.muted = true; 
                }
            });
            
            // 2. 현재 선택되어 노출되는 비디오 채널만 독점적으로 사운드를 오픈(muted = false)합니다.
            const activeVid = document.getElementById(`vid-${genreKey}`);
            if (activeVid) {
                activeVid.style.display = 'block';
                activeVid.muted = false; 
            }
            
            triggerRadioStreamFeed();
            navigateToSection('panel-player');
        }

        function toggleMyStatus(chosenStatus) {
            savedUserStatus = chosenStatus;
            document.getElementById('status-awake-btn').classList.toggle('active', chosenStatus === 'still awake');
            document.getElementById('status-sleepy-btn').classList.toggle('active', chosenStatus === 'sleepy');
            pushRowToStream(savedUserId, savedUserStatus, true);
        }

        function triggerRadioStreamFeed() {
            const textStream = document.getElementById('radio-chat-stream');
            if (!textStream) return;
            textStream.innerHTML = "";
            
            pushRowToStream(savedUserId, savedUserStatus, true);

            if (activeStreamInterval) clearInterval(activeStreamInterval);
            if (!USE_SIMULATION) return; 
            
            let cycle = 0;
            activeStreamInterval = setInterval(() => {
                if (cycle < radioActiveNetwork.length) {
                    pushRowToStream(radioActiveNetwork[cycle].id, radioActiveNetwork[cycle].status);
                    cycle++;
                } else {
                    const pickedUser = radioActiveNetwork[Math.floor(Math.random() * radioActiveNetwork.length)];
                    const sampleStatuses = ["still awake", "sleepy"];
                    pushRowToStream(pickedUser.id, sampleStatuses[Math.floor(Math.random() * sampleStatuses.length)]);
                }
            }, 3200);
        }

        function pushRowToStream(id, status, isMe = false) {
            const textStream = document.getElementById('radio-chat-stream');
            if (!textStream) return;

            const rowNode = document.createElement('div');
            rowNode.className = 'stream-row';
            
            const originalAsciiSheep = generateIdSheep(id); 
            
            rowNode.innerHTML = `
                <div class="stream-sheep">${originalAsciiSheep}</div>
                <div class="font-body stream-msg">
                    <span class="user-bold ${isMe ? 'me' : ''}">${id}</span> is ${status}
                </div>
            `;
            
            textStream.appendChild(rowNode);
            textStream.scrollTop = textStream.scrollHeight;
        }

        // 🛠️ 메인 메뉴판으로 나갈 때 열려있던 오디오를 다시 차단하여 사운드가 새어 나오지 않게 제어
        function returnToMenu() {
            if (activeStreamInterval) clearInterval(activeStreamInterval);
            
            genresList.forEach(genre => {
                const vid = document.getElementById(`vid-${genre}`);
                if (vid) {
                    vid.muted = true; 
                }
            });

            navigateToSection('panel-menu');
        }

        function navigateToSection(targetId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(targetId).classList.add('active');
        }
    </script>
</body>
</html>
